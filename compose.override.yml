services:

  # Local services are available on their ports, but also available on:
  # http://api.localhost.tiangolo.com: backend
  # http://dashboard.localhost.tiangolo.com: frontend
  # etc. To enable it, update .env, set:
  # DOMAIN=localhost.tiangolo.com
  proxy:
    image: traefik:3.6
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "10201:80"
      - "10202:8080"
    # Duplicate the command from compose.yml to add --api.insecure=true
    command:
      # Enable Docker in Traefik, so that it reads labels from Docker services
      - --providers.docker
      # Add a constraint to only use services with the label for this stack
      - --providers.docker.constraints=Label(`traefik.constraint-label`, `traefik-public`)
      # Do not expose all Docker services, only the ones explicitly exposed
      - --providers.docker.exposedbydefault=false
      # Create an entrypoint "http" listening on port 80
      - --entrypoints.http.address=:80
      # Create an entrypoint "https" listening on port 443
      - --entrypoints.https.address=:443
      # Enable the access log, with HTTP requests
      - --accesslog
      # Enable the Traefik log, for configurations and errors
      - --log
      # Enable debug logging for local development
      - --log.level=DEBUG
      # Enable the Dashboard and API
      - --api
      # Enable the Dashboard and API in insecure mode for local development
      - --api.insecure=true
    labels:
      # Enable Traefik for this service, to make it available in the public network
      - traefik.enable=true
      - traefik.constraint-label=traefik-public
      # Dummy https-redirect middleware that doesn't really redirect, only to
      # allow running it locally
      - traefik.http.middlewares.https-redirect.contenttype.autodetect=false
    networks:
      - traefik-public
      - default

  db:
    restart: "no"
    ports:
      - "10203:5432"

  adminer:
    restart: "no"
    ports:
      - "10204:8080"

  backend:
    restart: "no"
    ports:
      - "10205:8000"
    build:
      context: .
      dockerfile: backend/Dockerfile
    # command: sleep infinity  # Infinite loop to keep container alive doing nothing
    command:
      - fastapi
      - run
      - --reload
      - "app/main.py"
    # TODO: remove once coverage is done locally
    volumes:
      - ./backend:/app/backend
      - ./backend/htmlcov:/app/backend/htmlcov
    environment:
      SMTP_HOST: "mailcatcher"
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: "noreply@example.com"
      WATCHFILES_FORCE_POLLING: "true"
    develop:
      watch:
        - action: sync+restart
          path: ./backend/app
          target: /app/backend/app
          ignore:
            - __pycache__/
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./uv.lock

  prestart:
    volumes:
      - ./backend:/app/backend

  mailcatcher:
    image: schickling/mailcatcher
    ports:
      - "10208:1080"
      - "10209:1025"

  frontend:
    restart: "no"
    ports:
      - "10206:5173"
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    command:
      - npm
      - run
      - dev
      - --
      - --host
      - 0.0.0.0
      - --port
      - "5173"
    environment:
      # Vite dev 模式需要 NODE_ENV=development，否则 JSX 自动运行时会找不到 _jsxDEV
      NODE_ENV: "development"
      # 空字符串 → OpenAPI.BASE="" → 前端使用相对路径
      # /api/* 由 Vite proxy 转发到 backend 容器，无需跨域
      VITE_API_URL: ""
      # Vite proxy 在容器内使用 Docker 内部服务名到达 backend
      BACKEND_URL: "http://backend:8000"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app/frontend
      - ./node_modules:/app/node_modules
      - frontend-node_modules:/app/frontend/node_modules
    labels:
      - traefik.http.services.${STACK_NAME?Variable not set}-frontend.loadbalancer.server.port=5173
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/frontend/src
        - action: sync
          path: ./frontend/public
          target: /app/frontend/public
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./bun.lock

  chartdb:
    image: ghcr.io/chartdb/chartdb:latest
    restart: "no"
    ports:
      - "10207:80"

  playwright:
    profiles:
      - test
    build:
      context: .
      dockerfile: frontend/Dockerfile.playwright
      args:
        - VITE_API_URL=http://backend:8000
        - NODE_ENV=production
    ipc: host
    depends_on:
      - backend
      - mailcatcher
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://backend:8000
      - MAILCATCHER_HOST=http://mailcatcher:1080
      # For the reports when run locally
      - PLAYWRIGHT_HTML_HOST=0.0.0.0
      - CI=${CI}
    volumes:
      - ./frontend/blob-report:/app/frontend/blob-report
      - ./frontend/test-results:/app/frontend/test-results
    ports:
      - 10110:9323

networks:
  traefik-public:
    # For local dev, don't expect an external Traefik network
    external: false

volumes:
  frontend-node_modules:
