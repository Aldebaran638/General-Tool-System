services:
  proxy:
    image: traefik:3.6
    restart: "no"
    ports:
      - "10101:80"
      - "10102:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --providers.docker
      - --providers.docker.constraints=Label(`traefik.constraint-label`, `traefik-public`)
      - --providers.docker.exposedbydefault=false
      - --entrypoints.http.address=:80
      - --entrypoints.https.address=:443
      - --accesslog
      - --log
      - --log.level=DEBUG
      - --api
      - --api.insecure=true
    labels:
      - traefik.enable=true
      - traefik.constraint-label=traefik-public
      - traefik.http.middlewares.https-redirect.contenttype.autodetect=false
    networks:
      - traefik-public
      - default

  db:
    restart: "no"
    ports:
      - "10103:5432"

  adminer:
    restart: "no"
    ports:
      - "10104:8080"

  prestart:
    volumes:
      - ./backend:/app/backend

  backend:
    restart: "no"
    ports:
      - "10105:8000"
    command:
      - fastapi
      - run
      - --reload
      - "app/main.py"
    volumes:
      - ./backend:/app/backend
      - ./backend/htmlcov:/app/backend/htmlcov
    environment:
      SMTP_HOST: "mailcatcher"
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: "noreply@example.com"
      WATCHFILES_FORCE_POLLING: "true"

  mailcatcher:
    image: schickling/mailcatcher
    restart: "no"
    ports:
      - "10108:1080"
      - "10109:1025"

  frontend:
    restart: "no"
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    ports:
      - "10106:5173"
    command:
      - npm
      - run
      - dev
      - --
      - --host
      - 0.0.0.0
      - --port
      - "5173"
    environment:
      NODE_ENV: "development"
      VITE_API_URL: ""
      BACKEND_URL: "http://backend:8000"
      CHOKIDAR_USEPOLLING: "true"

  chartdb:
    image: ghcr.io/chartdb/chartdb:latest
    restart: "no"
    ports:
      - "10107:80"

networks:
  traefik-public:
    external: false
